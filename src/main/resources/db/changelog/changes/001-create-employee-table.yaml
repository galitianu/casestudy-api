databaseChangeLog:
  - changeSet:
      id: 001-create-employee-table
      author: codex
      changes:
        - createTable:
            tableName: employee
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: created
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: age
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: personnel_number
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: department
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: job_description
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: annual_income
                  type: INT
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: employee
            columnNames: personnel_number
            constraintName: uk_employee_personnel_number
